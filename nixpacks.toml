[phases.setup]
nixPkgs = ['ffmpeg', 'python3']

[phases.install]
cmds = [
  'mkdir -p /app/.bin',
  'ln -s $(which python3) /app/.bin/python',
  'export PATH=$PATH:/app/.bin && npm install'
]

[phases.build]
cmds = [
  'export PATH=$PATH:/app/.bin && cd frontend && npm install && npm run build'
]

[start]
cmd = 'export PATH=$PATH:/app/.bin && node backend/server.js'
